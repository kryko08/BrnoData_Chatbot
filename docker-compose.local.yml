volumes:
  agent_pg_data:


services:

  postgres:
    image: postgres:18
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - agent_pg_data:/var/lib/postgresql
    ports:
      - "5432:5432"

  agent:
    build:
      context: .
      dockerfile: ./compose/local/agent/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  api:
    build:
      context: .
      dockerfile: ./compose/local/api/Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8001:8001"
    volumes:
      - ./api:/app/api
    depends_on:
      - postgres